<!DOCTYPE html>
<html lang="az">
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta charset="UTF-8">
<title>Klik Oyunu</title>

<style>
body {
  background: linear-gradient(135deg, #1e1e2f, #3a3a5f);
  color: white;
  font-family: Arial;
  text-align: center;
  margin-top: 50px;
}

.box {
  background: rgba(255,255,255,0.1);
  padding: 20px;
  border-radius: 20px;
  width: 300px;
  margin: auto;
  box-shadow: 0 0 20px rgba(0,0,0,0.5);
}

h2 {
  margin-bottom: 20px;
}

p {
  font-size: 18px;
}

button {
  margin-top: 10px;
  font-size: 18px;
  padding: 10px 20px;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  transition: 0.2s;
}

.clickBtn {
  background: #ff9800;
  color: white;
}

.clickBtn:hover {
  background: #e68900;
  transform: scale(1.1);
}

.upgradeBtn {
  background: #4caf50;
  color: white;
}

.upgradeBtn:hover {
  background: #3e8e41;
}

</style>
</head>

<body>

<div class="box">
  <h2>🎮 Klik Oyunu</h2>

  <p>Bal: <span id="score">0</span></p>
  <p>🏆 Rekord: <span id="highScore">0</span></p>
  <p>💰 Coin: <span id="coin">0</span></p>

  <button class="clickBtn" onclick="addScore()">🔥 Bas!</button>

  <br><br>

  <button class="upgradeBtn" onclick="buyUpgrade()">💸 Upgrade (10 coin)</button>
</div>

<audio id="clickSound">
  <source src="mixkit-camera-shutter-click-1133.wav">
</audio>

<script>
let score = 0;
let coin = localStorage.getItem("coin") || 0;
let power = 1;

// Ekrana yaz
document.getElementById("coin").innerText = coin;

// Rekord
let highScore = localStorage.getItem("highScore") || 0;
document.getElementById("highScore").innerText = highScore;

function addScore() {
  score += power;
  coin++;

  document.getElementById("score").innerText = score;
  document.getElementById("coin").innerText = coin;

  // Coin yadda saxla
  localStorage.setItem("coin", coin);

  // Rekord
  if(score > highScore){
    highScore = score;
    localStorage.setItem("highScore", highScore);
    document.getElementById("highScore").innerText = highScore;
  }

  // Səs
  let sound = document.getElementById("clickSound");
  sound.currentTime = 0;
  sound.play();
}

function buyUpgrade() {
  if(coin >= 10){
    coin -= 10;
    power++;

    document.getElementById("coin").innerText = coin;

    // coin yenilə
    localStorage.setItem("coin", coin);
  } else {
    alert("Coin azdır!");
  }
}
</script>
