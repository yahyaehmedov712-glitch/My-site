<h2>🎮 Oyun: Kliklə bal yığ!</h2>

<p>Bal: <span id="score">0</span></p>
<p>🏆 Rekord: <span id="highScore">0</span></p>
<p>Coin: <span id="coin">0</span> 💰</p>

<button onclick="addScore()" style="font-size:22px; padding:15px;">
🔥 Bas!
</button>

<br><br>

<button onclick="buyUpgrade()" style="padding:10px;">
💸 Upgrade (10 coin)
</button>

<audio id="clickSound">
  <source src="mixkit-camera-shutter-click-1133.wav" type="audio/wav">
</audio>

<script>
let score = 0;
let coin = 0;
let power = 1;

// Rekordu götür
let highScore = localStorage.getItem("highScore") || 0;
document.getElementById("highScore").innerText = highScore;

function addScore() {
  score += power;
  coin++;

  document.getElementById("score").innerText = score;
  document.getElementById("coin").innerText = coin;

  // Rekord yenilə
  if(score > highScore){
    highScore = score;
    localStorage.setItem("highScore", highScore);
    document.getElementById("highScore").innerText = highScore;
  }

  // Səs
  let sound = document.getElementById("clickSound");
  sound.currentTime = 0;
  sound.play();
}

function buyUpgrade() {
  if(coin >= 10){
    coin -= 10;
    power++;
    document.getElementById("coin").innerText = coin;
  } else {
    alert("Coin azdır!");
  }
}
</script>
