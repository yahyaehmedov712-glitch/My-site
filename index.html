<h2>🎮 Oyun: Kliklə bal yığ!</h2>

<p>Bal: <span id="score">0</span></p>
<p>Coin: <span id="coin">0</span> 💰</p>

<button onclick="addScore()" style="font-size:22px; padding:15px;">
🔥 Bas!
</button>

<br><br>

<button onclick="buyUpgrade()" style="padding:10px;">
💸 Upgrade (10 coin)
</button>

<audio id="clickSound">
  <source src="mixkit-camera-shutter-click-1133.wav" type="audio/wav">
</audio>

<script>
let score = 0;
let coin = 0;
let power = 1; // neçə bal versin

function addScore() {
  score += power;
  coin++;

  document.getElementById("score").innerText = score;
  document.getElementById("coin").innerText = coin;

  document.getElementById("clickSound").play();
}

// UPGRADE
function buyUpgrade() {
  if(coin >= 10){
    coin -= 10;
    power++; // daha çox bal verir

    alert("🔥 Güc artdı! +" + power);

    document.getElementById("coin").innerText = coin;
  } else {
    alert("❌ Kifayət qədər coin yoxdur!");
  }
}
</script>
