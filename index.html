<!DOCTYPE html>
<html>
<head>
  <title>My Site</title>
</head>

<body style="text-align:center;">

<h1>Salam mənim saytım 🚀</h1>

<h2>🎮 Oyun: Kliklə bal yığ!</h2>

<p>Bal: <span id="score">0</span></p>

<button onclick="addScore()" style="font-size:22px; padding:15px;">
🔥 Bas!
</button>

<br><br>

<!-- SƏS (GİZLİ) -->
<audio id="clickSound">
  <source src="mixkit-camera-shutter-click-1133.wav" type="audio/wav">
</audio>

<script>
let score = 0;

function addScore() {
  score++;
  document.getElementById("score").innerText = score;

  // SƏS OYNAT
  let sound = document.getElementById("clickSound");
  sound.currentTime = 0;
  sound.play();
}
</script>

</body>
</html>
