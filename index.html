<!DOCTYPE html>
<html>
<head>
<title>My Site</title>
</head>

<body style="text-align:center;">

<h2>🎮 Oyun: Kliklə bal yığ!</h2>

<p style="font-size:20px;">Bal: <span id="score">0</span></p>

<button onclick="addScore()" 
style="font-size:22px; padding:15px; border-radius:10px; background:orange; border:none;">
  🔥 Bas!
</button>

<br><br>

<audio id="clickSound">
  <source src="mixkit-camera-shutter-click.wav" type="audio/wav">
</audio>

<script>
let score = 0;

function addScore() {
  score++;
  document.getElementById("score").innerText = score;

  document.getElementById("clickSound").play();

  document.body.style.background = 
    "hsl(" + (score * 20 % 360) + ", 70%, 80%)";

  if(score == 10){
    alert("🔥 10 bala çatdın!");
  }
}
</script>

</body>
</html>
